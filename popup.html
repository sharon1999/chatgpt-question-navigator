<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Question Navigator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="title">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
            fill="#10a37f"
          />
          <path
            d="M8 12L11 15L16 9"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Your Questions
      </div>
      <button id="export-btn" class="icon-btn" title="Export as text" aria-label="Export">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </button>
    </div>

    <div class="search-container">
      <div class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <input type="text" id="search-input" placeholder="Search questions..." />
    </div>

    <div id="loading" class="empty-state">Loading questions...</div>
    <div id="empty-state" class="empty-state" style="display: none">
      No questions found in this conversation.
    </div>

    <div id="question-list" class="question-list">
      <!-- Items will be injected here -->
    </div>

    <script src="html2pdf.bundle.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
